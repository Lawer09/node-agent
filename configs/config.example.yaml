listen_addr: ":2112"
metrics_path: "/metrics"
singbox_path: "/usr/local/bin/sing-box"

scheduler:
  max_workers: 20
  reload_every_seconds: 60
  fail_threshold: 3
  recover_threshold: 2

default_probe:
  interval_seconds: 60
  timeout_seconds: 8
  probe_mode: "standard"
  probe_targets:
    standard:
      - "https://cp.cloudflare.com/generate_204"
      - "https://www.gstatic.com/generate_204"
    business: []
  utls_fingerprint: "chrome"

subscription:
  enabled: true
  url: ""
  refresh_interval_seconds: 300
  enable_base64_decode: true
  include_protocols:
    - "vless"
  reality_only: true

probe_agent:
  name: "probe-sg-01"
  region: "ap-southeast"
  country: "SG"
  city: "Singapore"
  provider: "self"
  asn: "unknown"
  env: "prod"
  cluster: "default"

nodes: []